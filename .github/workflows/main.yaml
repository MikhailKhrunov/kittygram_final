name: Kittygram CI/CD

on:
  push:

jobs:
  backend_tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - '3.9'
          - '3.10'
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pycodestyle

      - name: Ruff check
        run: ruff check . --exclude migrations

      - name: Ruff format check
        run: ruff format --check . --exclude migrations

      - name: Pycodestyle check
        run: pycodestyle . --exclude migrations,venv --max-line-length=88

      - name: Run backend tests
        run: python manage.py test

  frontend_tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: CI=true npm test -- --watchAll=false

  build_and_push_to_docker_hub:
    runs-on: ubuntu-latest
    needs:
      - backend_tests
      - frontend_tests
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_backend:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_frontend:latest

      - uses: docker/build-push-action@v6
        with:
          context: ./nginx
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/kittygram_gateway:latest

  send_message:
    runs-on: ubuntu-latest
    needs: build_and_push_to_docker_hub
    if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && needs.build_and_push_to_docker_hub.result == 'success'
    steps:
      - uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            Kittygram workflow completed successfully
            Author: ${{ github.actor }}
            Commit message: ${{ github.event.head_commit.message }}
            Commit: https://github.com/${{ github.repository }}/commit/${{ github.sha }}
